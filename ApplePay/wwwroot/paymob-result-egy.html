<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Result - Paymob Egypt</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #34c759 0%, #007AFF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .region-badge {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .icon { font-size: 64px; margin-bottom: 20px; }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .title.success { color: #155724; }
        .title.failed  { color: #721c24; }
        .title.pending { color: #856404; }

        .subtitle {
            color: #666;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .details {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            margin-bottom: 30px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .detail-row:last-child { border-bottom: none; }

        .detail-row .label { color: #666; }
        .detail-row .value { font-weight: 600; color: #333; font-family: monospace; font-size: 13px; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.success { background: #d4edda; color: #155724; }
        .badge.failed  { background: #f8d7da; color: #721c24; }
        .badge.pending { background: #fff3cd; color: #856404; }

        .btn {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #34c759;
            color: white;
            margin-right: 10px;
        }

        .btn-primary:hover { background: #28a745; }

        .btn-secondary {
            background: #f1f3f4;
            color: #333;
        }

        .btn-secondary:hover { background: #e2e6ea; }

        .raw-params {
            background: #f1f3f4;
            border-radius: 8px;
            padding: 12px;
            text-align: left;
            font-size: 11px;
            color: #666;
            font-family: monospace;
            margin-top: 20px;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="region-badge">🇪🇬 Egypt — EGP</div>
        <div class="icon" id="icon"></div>
        <div class="title" id="title"></div>
        <div class="subtitle" id="subtitle"></div>

        <div class="details" id="details"></div>

        <div>
            <a href="/paymob-test.html" class="btn btn-primary">Try Again</a>
            <button class="btn btn-secondary" onclick="document.getElementById('raw').style.display='block';this.style.display='none'">Show Raw Params</button>
        </div>

        <div class="raw-params" id="raw"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);

        const success  = params.get('success') === 'true';
        const pending  = params.get('pending') === 'true';
        const txId     = params.get('id') || params.get('transaction_id') || 'N/A';
        const orderId  = params.get('order') || params.get('order_id') || 'N/A';
        const amount   = params.get('amount_cents');
        const currency = params.get('currency') || 'EGP';
        const source   = params.get('source_data.sub_type') || params.get('source_data_sub_type') || 'N/A';

        const iconEl     = document.getElementById('icon');
        const titleEl    = document.getElementById('title');
        const subtitleEl = document.getElementById('subtitle');
        const detailsEl  = document.getElementById('details');
        const rawEl      = document.getElementById('raw');

        if (success) {
            iconEl.textContent = '✅';
            titleEl.textContent = 'Payment Successful';
            titleEl.classList.add('success');
            subtitleEl.textContent = 'Your payment has been processed successfully.';
        } else if (pending) {
            iconEl.textContent = '⏳';
            titleEl.textContent = 'Payment Pending';
            titleEl.classList.add('pending');
            subtitleEl.textContent = 'Your payment is being processed. Please wait.';
        } else {
            iconEl.textContent = '❌';
            titleEl.textContent = 'Payment Failed';
            titleEl.classList.add('failed');
            subtitleEl.textContent = 'Something went wrong. Please try again.';
        }

        const statusClass = success ? 'success' : (pending ? 'pending' : 'failed');
        const statusText  = success ? 'Success' : (pending ? 'Pending' : 'Failed');

        const amountDisplay = amount ? (parseInt(amount) / 100).toFixed(2) + ' ' + currency : 'N/A';

        detailsEl.innerHTML = `
            <div class="detail-row">
                <span class="label">Status</span>
                <span class="badge ${statusClass}">${statusText}</span>
            </div>
            <div class="detail-row">
                <span class="label">Transaction ID</span>
                <span class="value">${txId}</span>
            </div>
            <div class="detail-row">
                <span class="label">Order ID</span>
                <span class="value">${orderId}</span>
            </div>
            <div class="detail-row">
                <span class="label">Amount</span>
                <span class="value">${amountDisplay}</span>
            </div>
            <div class="detail-row">
                <span class="label">Payment Method</span>
                <span class="value">${source}</span>
            </div>
            <div class="detail-row">
                <span class="label">Region</span>
                <span class="value">Egypt 🇪🇬</span>
            </div>
        `;

        rawEl.textContent = decodeURIComponent(window.location.search);
    </script>
</body>
</html>
