<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperPay Apple Pay Test</title>
    <script>
        // HyperPay COPYandPAY widget options
        var wpwlOptions = {
            applePay: {
                version: 14,
                checkAvailability: "applePayCapabilities",
                merchantIdentifier: "merchant.com.tamarran.nonstop",
                displayName: "Tamarran",
                total: {
                    label: "Tamarran",
                    amount: "1.00",
                    type: "final"
                },
                supportedNetworks: ["visa", "masterCard", "mada"],
                merchantCapabilities: ["supports3DS", "supportsCredit", "supportsDebit"],
                countryCode: "SA",
                currencyCode: "SAR"
            }
        };
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .product-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 28px;
            font-weight: bold;
            color: #007AFF;
        }

        .status {
            padding: 15px;
            margin: 20px 0;
            border-radius: 12px;
            font-weight: 500;
            display: none;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .payment-details {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: left;
            font-size: 14px;
            display: none;
        }

        .payment-details h4 {
            margin-bottom: 10px;
            color: #333;
        }

        .payment-details p {
            margin: 5px 0;
            color: #666;
        }

        .debug-info {
            background: #f1f3f4;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: left;
            font-size: 12px;
            color: #666;
            display: none;
        }

        .spinner {
            display: none;
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007AFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">HyperPay Test</div>
        <div class="subtitle">Apple Pay Integration Demo</div>
        
        <div class="product-info">
            <div class="product-name">Premium Test Product</div>
            <div class="product-price">SAR 1.00</div>
        </div>
        
        <div id="hyperpay-widget-container" style="margin-top: 20px; min-height: 60px;"></div>
        
        <div class="spinner" id="spinner"></div>
        
        <div id="status" class="status"></div>
        
        <div id="payment-details" class="payment-details">
            <h4>Payment Details</h4>
            <p><strong>Payment ID:</strong> <span id="payment-id"></span></p>
            <p><strong>Transaction ID:</strong> <span id="transaction-id"></span></p>
            <p><strong>Status:</strong> <span id="payment-status"></span></p>
            <p><strong>Amount:</strong> <span id="payment-amount"></span></p>
            <p><strong>Timestamp:</strong> <span id="payment-timestamp"></span></p>
        </div>
        
        <div id="debug-info" class="debug-info">
            <h4>Debug Information</h4>
            <div id="debug-content"></div>
        </div>
        
        <div class="footer">
            <p>HyperPay Apple Pay Integration Test</p>
            <p>Merchant ID: merchant.com.tamarran.nonstop</p>
        </div>
    </div>

    <script>
        class HyperPayApplePayTest {
            constructor() {
                this.currencyCode = 'SAR';
                this.amount = 1.00;
                this.init();
            }

            async init() {
                this.showStatus('Loading HyperPay Apple Pay...', 'info');
                this.showDebug('Creating HyperPay checkout...');
                this.showSpinner(true);

                try {
                    const response = await fetch('/api/hyperpay/applepay/checkout', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            amount: this.amount,
                            currency: this.currencyCode,
                            paymentType: 'DB'
                        })
                    });

                    const result = await response.json();

                    if (!response.ok || !result.success) {
                        throw new Error(result.error || result.message || 'Failed to create checkout');
                    }

                    this.showDebug('Checkout created: ' + result.checkoutId);
                    this.renderHyperPayWidget(result);
                    this.showStatus('Apple Pay is ready. Click the button below.', 'success');
                    this.showSpinner(false);

                } catch (error) {
                    console.error('Checkout error:', error);
                    this.showStatus('Failed to load Apple Pay', 'error');
                    this.showSpinner(false);
                    this.showDebug('Error: ' + error.message);
                }
            }

            renderHyperPayWidget(checkout) {
                const container = document.getElementById('hyperpay-widget-container');
                container.innerHTML = '';

                const form = document.createElement('form');
                form.action = checkout.shopperResultUrl;
                form.className = 'paymentWidgets';
                form.setAttribute('data-brands', 'APPLEPAY');
                container.appendChild(form);

                const script = document.createElement('script');
                script.src = checkout.widgetUrl;
                if (checkout.integrity) {
                    script.integrity = checkout.integrity;
                    script.crossOrigin = 'anonymous';
                }
                script.onload = () => this.showDebug('HyperPay widget loaded');
                script.onerror = () => this.showDebug('Failed to load widget');
                document.body.appendChild(script);
            }

            showStatus(message, type) {
                const statusDiv = document.getElementById('status');
                statusDiv.textContent = message;
                statusDiv.className = 'status ' + type;
                statusDiv.style.display = 'block';
            }

            showSpinner(show) {
                document.getElementById('spinner').style.display = show ? 'block' : 'none';
            }

            showDebug(message) {
                const debugDiv = document.getElementById('debug-info');
                const debugContent = document.getElementById('debug-content');
                const timestamp = new Date().toLocaleTimeString();
                debugContent.innerHTML += '<div>[' + timestamp + '] ' + message + '</div>';
                debugDiv.style.display = 'block';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new HyperPayApplePayTest();
        });
    </script>
</body>
</html>
